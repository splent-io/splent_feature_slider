[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_slider"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "slider feature"

[tool.splent.contract.provides]
routes     = ["/admin/slider", "/admin/slider/<int:slide_id>/delete", "/admin/slider/<int:slide_id>/edit", "/admin/slider/new"]
blueprints = []
models     = ["Slide"]
commands   = ["hello"]
hooks      = ["layout.authenticated_sidebar", "layout.hero"]
services   = ["SliderService"]
signals    = []
translations = []
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["SliderService"]
templates = ["slider/admin/form.html", "slider/admin/list.html", "slider/carousel.html"]
models    = ["Slide"]
hooks     = ["layout.authenticated_sidebar", "layout.hero"]
routes    = false
